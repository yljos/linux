font=Liberation Mono:size=10

[scrollback]
lines=16384
[colors]
alpha=0.7
background=111111
foreground=dddddd

## Normal/regular colors (color palette 0-7)
regular0=282828  # black
regular1=fb4934  # red
regular2=b8bb26  # green
regular3=fabd2f  # yellow
regular4=83a598  # blue (这是一个更清晰、更亮的青蓝色)
regular5=d3869b  # magenta
regular6=8ec07c  # cyan
regular7=d5c4a1  # white

## Bright colors (color palette 8-15)
bright0=665c54   # bright black
bright1=fb4934   # bright red
bright2=b8bb26   # bright green
bright3=fabd2f   # bright yellow
bright4=83a598   # bright blue (与普通蓝相同，确保一致性和清晰度)
bright5=d3869b   # bright magenta
bright6=8ec07c   # bright cyan
bright7=fbf1c7   # bright white

## Misc colors (保持你原来的选择，它们很不错)
selection-foreground=eeeeee
selection-background=005577
scrollback-indicator=242424 005577

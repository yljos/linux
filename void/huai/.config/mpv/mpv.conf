# --- 视频输出设置 ---
# 强制使用 OpenGL 并锁定 API，禁止 mpv 尝试加载并报错 Vulkan
vo=gpu
gpu-api=opengl
# 禁用最高质量的高级着色器以节省显存带宽 (对 4K 60fps 至关重要)
profile=fast

# --- 硬件解码设置 ---
hwdec=vaapi
# 强制启用硬解的“零拷贝”模式，减少显存与内存间的交换
vaapi-device=/dev/dri/renderD128

# --- 音频设置 ---
# 既然 PipeWire 报错，直接锁死 ALSA 避免启动时的搜索延迟
ao=alsa

# --- 缓存与丢帧处理 ---
demuxer-max-bytes=2048MiB
demuxer-max-back-bytes=500MiB
# 当 GPU 渲染压力过大时，优先丢弃处理不掉的视频帧，确保音画同步
framedrop=vo
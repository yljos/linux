# Alacritty 0.11 Configuration (YAML)

font:
  size: 12.0
  normal:
    family: "Liberation Mono"
    style: "Regular"
  italic:
    family: "Liberation Mono"
    style: "Italic"
  bold:
    family: "Liberation Mono"
    style: "Bold"
  bold_italic:
    family: "Liberation Mono"
    style: "Bold Italic"

window:
  # Maintain minimalist feel with 0.7 opacity 
  opacity: 1.0

colors:
  # [Primary colors] - Eye protection settings
  primary:
    # background: '#1e1e1e' 
    background: '#282828' 
    foreground: '#d1d1d1'


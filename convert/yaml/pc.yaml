mixed-port: 12138
allow-lan: false
bind-address: "*"
find-process-mode: "off"
log-level: error
ipv6: false
udp: true
unified-delay: true
tcp-concurrent: true
profile:
  store-selected: false
  store-fake-ip: true
external-controller: 127.0.0.1:9090
external-ui: ui
external-ui-url: https://raw.githubusercontent.com/yljos/linux/refs/heads/main/rule-set/dist.zip
ntp:
  enable: true
  write-to-system: false
  server: ntp.aliyun.com
  port: 123
  interval: 30
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    TLS:
      ports:
        - 443
        - 8443
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
  skip-domain:
    - Mijia Cloud
    - dlg.io.mi.com
dns:
  enable: true
  prefer-h3: false
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - +.lan
    - +.local
    - localhost.ptlogin2.qq.com
    - +.msftconnecttest.com
    - +.msftncsi.com
    - +.googleapis.com
    - +.googleapis.cn
    - rule-set:googlefcm-site
    - rule-set:cloudflare-site
  use-hosts: true
  default-nameserver:
    - 223.5.5.5#DIRECT
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query#DIRECT
  nameserver:
    - https://cloudflare-dns.com/dns-query#M
  direct-nameserver:
    - https://dns.alidns.com/dns-query#DIRECT
  nameserver-policy:
    rule-set:microsoft-site: https://cloudflare-dns.com/dns-query#Microsoft
    rule-set:openai-site: https://cloudflare-dns.com/dns-query#OpenAi
    rule-set:steam-site-classical: https://cloudflare-dns.com/dns-query#Steam
    rule-set:github-site: https://cloudflare-dns.com/dns-query#GitHub
    rule-set:codeberg-site: https://cloudflare-dns.com/dns-query#GitHub
    rule-set:telegram-site: https://cloudflare-dns.com/dns-query#Telegram
    rule-set:twitter-site: https://cloudflare-dns.com/dns-query#Twitter
    rule-set:tiktok-site: https://cloudflare-dns.com/dns-query#TikTok
    rule-set:youtube-site: https://dns.google/dns-query#Google
    rule-set:googlefcm-site: https://dns.google/dns-query#Google
    rule-set:google-site: https://dns.google/dns-query#Google
    rule-set:speedtest-site: https://cloudflare-dns.com/dns-query#M
proxies: []
proxy-groups:
  - type: select
    name: M
    proxies:
      - SG-fallback
      - JP-fallback
      - US-fallback
      - HK-fallback
  - type: select
    name: Default
    proxies:
      - REJECT
      - DIRECT
      - M
  - type: select
    hidden: true
    name: Google
    include-all-proxies: true
    filter: "(?i)^(?=.*gemini)(?=.*us)"
    proxies:
      - US-fallback
      - JP-fallback
      - SG-fallback
      - HK-fallback
  - type: select
    hidden: true
    name: OpenAi
    proxies:
      - JP-fallback
      - SG-fallback
      - US-fallback
      - HK-fallback
  - type: select
    hidden: true
    name: Telegram
    proxies:
      - JP-fallback
      - SG-fallback
      - US-fallback
      - HK-fallback
  - type: select
    hidden: true
    name: Steam
    proxies:
      - DIRECT
      - JP-fallback
      - SG-fallback
      - US-fallback
      - HK-fallback
  - type: select
    hidden: true
    name: PikPak
    proxies:
      - SG-fallback
      - JP-fallback
      - US-fallback
      - HK-fallback
  - type: select
    hidden: true
    name: GitHub
    proxies:
      - JP-fallback
      - SG-fallback
      - US-fallback
      - HK-fallback
  - type: select
    hidden: true
    name: Microsoft
    proxies:
      - JP-fallback
      - SG-fallback
      - US-fallback
      - HK-fallback
  - type: select
    hidden: true
    name: TikTok
    proxies:
      - JP-fallback
  - type: select
    hidden: true
    name: Twitter
    proxies:
      - US-fallback
  - type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 30
    tolerance: 300
    timeout: 3000
    max-failed-times: 3
    include-all-proxies: true
    hidden: true
    name: HK-TCP-url-test
    filter: "(?i)^(?=.*(HK))(?!.*(UDP|HY2)).*$"
  - type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 30
    tolerance: 300
    timeout: 3000
    max-failed-times: 3
    include-all-proxies: true
    hidden: true
    name: JP-TCP-url-test
    filter: "(?i)^(?=.*(JP))(?!.*(UDP|HY2)).*$"
  - type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 30
    tolerance: 300
    timeout: 3000
    max-failed-times: 3
    include-all-proxies: true
    hidden: true
    name: SG-TCP-url-test
    filter: "(?i)^(?=.*(SG))(?!.*(UDP|HY2)).*$"
  - type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 30
    tolerance: 300
    timeout: 3000
    max-failed-times: 3
    include-all-proxies: true
    hidden: true
    name: US-TCP-url-test
    filter: "(?i)^(?=.*(US))(?!.*(UDP|HY2)).*$"
  - type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 30
    tolerance: 300
    timeout: 3000
    max-failed-times: 3
    include-all-proxies: true
    hidden: true
    name: HK-UDP-url-test
    filter: "(?i)^(?=.*(HK))(?=.*(-UDP|-HY2))(?!.*(小众)).*$"
  - type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 30
    tolerance: 300
    timeout: 3000
    max-failed-times: 3
    include-all-proxies: true
    hidden: true
    name: JP-UDP-url-test
    filter: "(?i)^(?=.*(JP))(?=.*(-UDP|-HY2))(?!.*(小众)).*$"
  - type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 30
    tolerance: 300
    timeout: 3000
    max-failed-times: 3
    include-all-proxies: true
    hidden: true
    name: SG-UDP-url-test
    filter: "(?i)^(?=.*(SG))(?=.*(-UDP|-HY2))(?!.*(小众)).*$"
  - type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 30
    tolerance: 300
    timeout: 3000
    max-failed-times: 3
    include-all-proxies: true
    hidden: true
    name: US-UDP-url-test
    filter: "(?i)^(?=.*(US))(?=.*(-UDP|-HY2))(?!.*(小众)).*$"
  - type: fallback
    url: "https://www.gstatic.com/generate_204"
    interval: 30
    timeout: 3000
    max-failed-times: 3
    name: SG-fallback
    proxies:
      - SG-TCP-url-test
      - SG-UDP-url-test
  - type: fallback
    url: "https://www.gstatic.com/generate_204"
    interval: 30
    timeout: 3000
    max-failed-times: 3
    name: JP-fallback
    proxies:
      - JP-TCP-url-test
      - JP-UDP-url-test
  - type: fallback
    url: "https://www.gstatic.com/generate_204"
    interval: 30
    timeout: 3000
    max-failed-times: 3
    name: US-fallback
    proxies:
      - US-TCP-url-test
      - US-UDP-url-test
  - type: fallback
    url: "https://www.gstatic.com/generate_204"
    interval: 30
    timeout: 3000
    max-failed-times: 3
    name: HK-fallback
    proxies:
      - HK-TCP-url-test
      - HK-UDP-url-test
